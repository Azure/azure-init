name: "Code Coverage Report"

on:
  pull_request:
    branches:
      - main

jobs:
  coverage:
    name: Modified lines coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch for diff
        run: git fetch origin ${{ github.base_ref }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests and generate Cobertura coverage
        run: cargo llvm-cov --workspace --cobertura --output-path cobertura.xml

      - name: Code coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: cobertura.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '95 100'

      - name: Post overall coverage to job summary
        if: always()
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Install diff-cover
        run: pip install diff-cover

      - name: Check coverage on modified lines
        id: diff-coverage
        continue-on-error: true
        run: |
          diff-cover cobertura.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --ignore-staged \
            --ignore-unstaged \
            --show-uncovered \
            --fail-under=100 \
            --format markdown:coverage-report.md

      - name: Post coverage report to job summary
        if: always() && hashFiles('coverage-report.md') != ''
        run: cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if coverage threshold not met
        if: steps.diff-coverage.outcome == 'failure'
        run: |
          echo "::error::Coverage on modified lines is below the 100% threshold."
          exit 1
